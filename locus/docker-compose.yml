version: "3.8"

services:
  locust:
    build:
      context: .
      dockerfile: Dockerfile.locust
    container_name: locust
    ports:
      - "8089:8089"
    environment:
      - LOCUST_HOST=http://penguins_api:8000
    networks:
      - taller6_mlops_net

networks:
  taller6_mlops_net:
    external: true
